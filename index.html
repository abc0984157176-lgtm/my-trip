<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul 2026 Final</title>
    <style>
        :root { --bg: #F9F9F9; --primary: #4E3629; --accent: #333; --naver: #03C75A; --red: #E57373; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding-bottom: 120px; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; margin: 0; }
        .header h1 span { color: var(--red); margin-right: 5px; }
        .date-range { background: #EEE; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #666; font-weight: bold; }
        
        /* 頂部日期選擇器 */
        .date-picker { display: flex; overflow-x: auto; padding: 10px 20px; gap: 12px; scrollbar-width: none; }
        .date-picker::-webkit-scrollbar { display: none; }
        .date-item { min-width: 65px; height: 85px; background: white; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .date-item.active { background: var(--accent); color: white; }
        .date-item .day { font-size: 20px; font-weight: bold; }

        .content { padding: 20px; }
        .day-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-plus { width: 45px; height: 45px; background: #DDD; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; font-size: 24px; }
        
        /* 行程卡片 */
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; }
        .time-tag { display: inline-block; background: #FFF1F1; color: var(--red); font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 5px; margin-bottom: 8px; }
        .note-text { font-size: 13px; color: #777; margin: 8px 0; background: #FDFDFD; padding: 8px; border-radius: 8px; border: 1px dashed #EEE; }
        .naver-link { display: inline-block; color: var(--naver); text-decoration: none; font-size: 13px; font-weight: bold; margin-top: 5px; }
        
        /* 預算控制 */
        .budget-box { background: var(--primary); color: white; border-radius: 22px; padding: 20px; margin-bottom: 20px; }
        .progress-container { background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--red); height: 100%; width: 0%; transition: 0.5s; }

        /* 換匯（韓幣轉台幣） */
        .ex-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #EEE; }
        .ex-card input { width: 100%; border: none; font-size: 24px; font-weight: bold; color: var(--primary); outline: none; margin-top: 5px; background: transparent; }

        /* 導覽列 */
        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); height: 65px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2000; }
        .nav-item { border: none; background: none; color: #CCC; font-size: 24px; }
        .nav-item.active { color: var(--primary); }

        /* 彈窗 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 3000; }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 30px; max-height: 85vh; overflow-y: auto; }
        label { font-size: 12px; color: #999; margin-bottom: 4px; display: block; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #EEE; font-size: 16px; background: #F9F9F9; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; }
        
        .todo-item { display: flex; align-items: center; padding: 15px; background: white; border-radius: 15px; margin-bottom: 10px; }
        .todo-item.done { opacity: 0.5; text-decoration: line-through; }
        .expense-date { font-size: 11px; background: #EEE; padding: 2px 6px; border-radius: 4px; color: #666; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>SEOUL</span>2026</h1>
        <div class="date-range">5/27 - 6/2</div>
    </div>

    <!-- 行程 (🧭) -->
    <div id="tab-plan" class="tab-content">
        <div class="date-picker" id="datePicker"></div>
        <div class="content">
            <div class="day-title-row"><h2 id="currentDayTitle">行程表</h2><button class="btn-plus" onclick="openModal('p')">+</button></div>
            <div id="planList"></div>
        </div>
    </div>

    <!-- 航班/清單 (📝) -->
    <div id="tab-list" class="tab-content" style="display:none">
        <div class="content">
            <h2>✈️ 航班資訊</h2>
            <div class="card">
                <button onclick="openModal('f')" style="float:right; border:none; background:none; color:blue;">編輯</button>
                <div id="flightInfo" style="font-weight:bold;">尚未設定</div>
                <div id="flightCountDown" style="font-size:13px; color:var(--red); margin-top:8px;"></div>
            </div>
            <div class="day-title-row" style="margin-top:30px"><h2>📋 行前準備</h2><button class="btn-plus" onclick="openModal('t')">+</button></div>
            <div id="todoList"></div>
        </div>
    </div>

    <!-- 記帳/預算 (💳) -->
    <div id="tab-wallet" class="tab-content" style="display:none">
        <div class="content">
            <div class="budget-box">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:14px; opacity:0.8;">剩餘預算 (TWD)</span>
                    <button onclick="openModal('b')" style="background:none; border:1px solid rgba(255,255,255,0.3); color:white; border-radius:10px; font-size:10px; padding:2px 8px;">設定預算</button>
                </div>
                <div id="budgetLeft" style="font-size:32px; font-weight:bold; margin-top:10px;">$ 0</div>
                <div class="progress-container"><div class="progress-bar" id="budgetBar"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.8;">
                    <span id="budgetSpent">已花: $0</span>
                    <span id="budgetTotal">總額: $0</span>
                </div>
            </div>

            <div class="ex-card">
                <div style="font-size:12px; color:#999;">💰 韓元轉台幣 (KRW ➔ TWD)</div>
                <input type="number" id="krwInput" placeholder="輸入韓元" oninput="calcTwd(this.value)">
                <div id="twdResult" style="margin-top:10px; color:var(--red); font-weight:bold;">≈ NT$ 0</div>
            </div>

            <div class="day-title-row"><h2>消費紀錄</h2><button class="btn-plus" onclick="openModal('w')">+</button></div>
            <div id="walletList"></div>
        </div>
    </div>

    <!-- 底部導覽 -->
    <div class="nav-bar">
        <button class="nav-item" onclick="switchTab('list', this)">📝</button>
        <button class="nav-item active" onclick="switchTab('plan', this)">🧭</button>
        <button class="nav-item" onclick="switchTab('wallet', this)">💳</button>
    </div>

    <!-- 彈窗 -->
    <div class="modal" id="modal">
        <div class="modal-body">
            <h2 id="modalTitle">新增項目</h2>
            <div id="modalFields"></div>
            <button class="btn-save" onclick="handleSave()">儲存</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        const RATE = 0.024; 
        let activeDay = 0;
        let db = JSON.parse(localStorage.getItem('SeoulV13')) || { 
            plan:[[],[],[],[],[],[],[]], todo:[], wallet:[], flight:"", flightTime:"", budget: 50000 
        };

        function init() {
            const picker = document.getElementById('datePicker');
            const dates = [{d:27,w:'W'},{d:28,w:'T'},{d:29,w:'F'},{d:30,w:'S'},{d:31,w:'S'},{d:1,w:'M'},{d:2,w:'T'}];
            picker.innerHTML = dates.map((d, i) => `
                <div class="date-item ${i===activeDay?'active':''}" onclick="selectDay(${i})">
                    <div style="font-size:10px; opacity:0.5">${d.w}</div><div class="day">${d.d}</div>
                </div>
            `).join('');
            renderAll();
            setInterval(updateFlightTimer, 60000);
        }

        function selectDay(i) {
            activeDay = i;
            document.querySelectorAll('.date-item').forEach((el, idx) => el.classList.toggle('active', idx===i));
            renderPlan();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('tab-'+tab).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
        }

        function renderPlan() {
            const list = document.getElementById('planList');
            list.innerHTML = db.plan[activeDay].map((p, i) => `
                <div class="card">
                    ${p.time ? `<div class="time-tag">⏰ ${p.time}</div>` : ''}
                    <h3 style="margin:0">${p.name}</h3>
                    ${p.note ? `<div class="note-text">${p.note}</div>` : ''}
                    ${p.link ? `<a href="${p.link}" target="_blank" class="naver-link">📍 Naver Map</a>` : ''}
                    <div style="margin-top:12px; display:flex; gap:10px;">
                        <button class="btn-move" onclick="moveP(${i},-1)">↑</button>
                        <button class="btn-move" onclick="moveP(${i},1)">↓</button>
                        <button class="btn-move" style="color:red; margin-left:auto; opacity:0.3" onclick="delP(${i})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderWallet() {
            let totalSpentTwd = 0;
            const list = document.getElementById('walletList');
            list.innerHTML = db.wallet.map((w, i) => {
                const twd = Math.round(w.amount * RATE);
                totalSpentTwd += twd;
                return `
                    <div class="card" onclick="delW(${i})">
                        <div style="display:flex; align-items:center; margin-bottom:5px;">
                            <span class="expense-date">${w.date || '未設'}</span>
                            <b>${w.name}</b>
                        </div>
                        <span style="color:var(--red); font-weight:bold;">₩${Number(w.amount).toLocaleString()}</span>
                        <div style="font-size:12px; color:#999; margin-top:2px;">≈ NT$ ${twd.toLocaleString()} | ${w.pay}</div>
                    </div>
                `;
            }).join('');
            const remaining = db.budget - totalSpentTwd;
            const percent = Math.min((totalSpentTwd / db.budget) * 100, 100);
            document.getElementById('budgetLeft').innerText = `$ ${remaining.toLocaleString()}`;
            document.getElementById('budgetSpent').innerText = `已花: $${totalSpentTwd.toLocaleString()}`;
            document.getElementById('budgetTotal').innerText = `總額: $${db.budget.toLocaleString()}`;
            document.getElementById('budgetBar').style.width = percent + '%';
        }

        function calcTwd(krw) { 
            document.getElementById('twdResult').innerText = `≈ NT$ ${Math.round(krw * RATE).toLocaleString()}`; 
        }

        let mType = '';
        function openModal(type) {
            mType = type;
            document.getElementById('modal').classList.add('active');
            const f = document.getElementById('modalFields');
            if(type==='p') {
                f.innerHTML = `
                    <label>時間 (選填)</label><input id="it" type="time">
                    <label>景點名稱</label><input id="i1">
                    <label>註記 (選填)</label><textarea id="in" rows="2"></textarea>
                    <label>Naver Map 連結 (選填)</label><input id="ilink" placeholder="貼上網址">
                `;
            } else if(type==='t') {
                f.innerHTML = `<label>準備項目</label><input id="i1">`;
            } else if(type==='f') {
                f.innerHTML = `<label>航班號</label><input id="i1" value="${db.flight}"><label>日期時間</label><input id="i2" type="datetime-local" value="${db.flightTime}">`;
            } else if(type==='w') {
                const today = new Date().toISOString().split('T')[0];
                f.innerHTML = `<label>日期</label><input id="idate" type="date" value="${today}"><label>品項</label><input id="i1"><label>金額 (KRW)</label><input id="i2" type="number"><label>方式</label><select id="i3"><option>卡片/WOWPASS</option><option>現金</option></select>`;
            } else if(type==='b') {
                f.innerHTML = `<label>設定總預算 (TWD)</label><input id="i1" type="number" value="${db.budget}">`;
            }
        }

        function handleSave() {
            const v1 = document.getElementById('i1')?.value;
            const v2 = document.getElementById('i2')?.value;
            
            if(mType==='p' && v1) {
                db.plan[activeDay].push({
                    name: v1, 
                    time: document.getElementById('it').value, 
                    note: document.getElementById('in').value,
                    link: document.getElementById('ilink').value // 連結補回去了！
                });
            } else if(mType==='t' && v1) {
                db.todo.push({text:v1, done:false});
            } else if(mType==='f') {
                db.flight = v1; db.flightTime = v2;
            } else if(mType==='w' && v1) {
                db.wallet.push({name:v1, amount:v2, pay:document.getElementById('i3').value, date:document.getElementById('idate').value});
            } else if(mType==='b') {
                db.budget = Number(v1);
            }
            closeModal(); saveDB(); renderAll();
        }

        function saveDB() { localStorage.setItem('SeoulV13', JSON.stringify(db)); }
        function renderAll() {
            renderPlan(); renderWallet();
            document.getElementById('todoList').innerHTML = db.todo.map((t,i)=>`<div class="todo-item ${t.done?'done':''}" onclick="toggleT(${i})">${t.done?'✅':'☐'} ${t.text}</div>`).join('');
            document.getElementById('flightInfo').innerText = db.flight ? `航班：${db.flight}` : "尚未設定";
            updateFlightTimer();
        }

        function updateFlightTimer() {
            if(!db.flightTime) return;
            const diff = (new Date(db.flightTime) - new Date()) / 1000 / 60;
            document.getElementById('flightCountDown').innerText = diff > 0 ? `🛫 距離起飛：${Math.floor(diff/60)}時 ${Math.floor(diff%60)}分` : "旅途愉快！";
        }

        function toggleT(i) { db.todo[i].done = !db.todo[i].done; saveDB(); renderAll(); }
        function moveP(i,d) { 
            let t = i+d; if(t>=0 && t<db.plan[activeDay].length) { [db.plan[activeDay][i], db.plan[activeDay][t]] = [db.plan[activeDay][t], db.plan[activeDay][i]]; saveDB(); renderPlan(); }
        }
        function delP(i) { db.plan[activeDay].splice(i,1); saveDB(); renderPlan(); }
        function delW(i) { if(confirm('刪除紀錄？')){db.wallet.splice(i,1); saveDB(); renderWallet();} }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        init();
    </script>
</body>
</html>
