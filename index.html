<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul 2026</title>
    <style>
        :root { --bg: #F9F9F9; --primary: #4E3629; --accent: #333; --naver: #03C75A; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding-bottom: 120px; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; margin: 0; }
        .header h1 span { color: #E57373; margin-right: 5px; }
        .date-range { background: #EEE; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #666; font-weight: bold; }
        .date-picker { display: flex; overflow-x: auto; padding: 10px 20px; gap: 12px; scrollbar-width: none; }
        .date-picker::-webkit-scrollbar { display: none; }
        .date-item { min-width: 65px; height: 85px; background: white; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .date-item.active { background: var(--accent); color: white; }
        .date-item .week { font-size: 10px; opacity: 0.6; margin-bottom: 5px; }
        .date-item .day { font-size: 20px; font-weight: bold; }
        .content { padding: 20px; }
        .day-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-plus { width: 45px; height: 45px; background: #DDD; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; font-size: 24px; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .btn-move { background: #F5F5F7; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; margin-right: 5px; }
        .flight-status { font-size: 13px; color: #E57373; font-weight: bold; background: #FFF1F1; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .ex-card { background: var(--primary); color: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .ex-card input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 10px; font-size: 18px; margin-top: 10px; }
        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); height: 65px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
        .nav-item { border: none; background: none; color: #CCC; font-size: 24px; }
        .nav-item.active { color: var(--primary); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 3000; }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 30px; max-height: 80vh; overflow-y: auto; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #EEE; font-size: 16px; background: #F9F9F9; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; }
        .todo-item { display: flex; align-items: center; padding: 15px; background: white; border-radius: 15px; margin-bottom: 10px; }
        .todo-item.done { opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>SEOUL</span>2026</h1>
        <div class="date-range">5/27 - 6/2</div>
    </div>

    <!-- 行程 (🧭) -->
    <div id="tab-plan" class="tab-content">
        <div class="date-picker" id="datePicker"></div>
        <div class="content">
            <div class="day-title-row">
                <h2 id="currentDayTitle">Day 1 行程</h2>
                <button class="btn-plus" onclick="openModal('p')">+</button>
            </div>
            <div id="planList"></div>
        </div>
    </div>

    <!-- 航班/準備 (📝) -->
    <div id="tab-list" class="tab-content" style="display:none">
        <div class="content">
            <h2>✈️ 航班資訊</h2>
            <div class="card">
                <button onclick="openModal('f')" style="float:right; border:none; background:none; color:blue;">編輯</button>
                <div id="flightInfo">尚未設定航班</div>
                <div id="flightCountDown" class="flight-status"></div>
            </div>
            <div class="day-title-row" style="margin-top:30px">
                <h2>📋 行前準備</h2>
                <button class="btn-plus" onclick="openModal('t')">+</button>
            </div>
            <div id="todoList"></div>
        </div>
    </div>

    <!-- 記帳 (💳) -->
    <div id="tab-wallet" class="tab-content" style="display:none">
        <div class="content">
            <div class="ex-card">
                <div style="font-size:14px; opacity:0.8;">💰 匯率換算 (KRW ➔ TWD)</div>
                <input type="number" id="krwInput" placeholder="輸入韓元" oninput="calcEx(this.value)">
                <div id="twdResult" style="margin-top:15px; font-size:24px; font-weight:bold;">≈ NT$ 0</div>
            </div>
            <div class="day-title-row"><h2>消費紀錄</h2><button class="btn-plus" onclick="openModal('w')">+</button></div>
            <div id="walletList"></div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item" onclick="switchTab('list', this)">📝</button>
        <button class="nav-item active" onclick="switchTab('plan', this)">🧭</button>
        <button class="nav-item" onclick="switchTab('wallet', this)">💳</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-body">
            <h2 id="modalTitle">新增項目</h2>
            <div id="modalFields"></div>
            <button class="btn-save" onclick="handleSave()">儲存</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        const dateData = [
            {d:27, w:'WED', dt:'5/27'}, {d:28, w:'THR', dt:'5/28'}, {d:29, w:'FRI', dt:'5/29'},
            {d:30, w:'SAT', dt:'5/30'}, {d:31, w:'SUN', dt:'5/31'}, {d:1, w:'MON', dt:'6/1'}, {d:2, w:'TUE', dt:'6/2'}
        ];
        let activeDay = 0;
        let db = JSON.parse(localStorage.getItem('SeoulV9')) || { plan:[[],[],[],[],[],[],[]], todo:[], wallet:[], flight:"", flightTime:"" };

        function init() {
            const picker = document.getElementById('datePicker');
            picker.innerHTML = dateData.map((d, i) => `
                <div class="date-item ${i===activeDay?'active':''}" onclick="selectDay(${i})">
                    <div class="week">${d.w}</div>
                    <div class="day">${d.d}</div>
                </div>
            `).join('');
            renderAll();
            setInterval(updateFlightTimer, 60000);
        }

        function selectDay(i) {
            activeDay = i;
            document.querySelectorAll('.date-item').forEach((el, idx) => el.classList.toggle('active', idx===i));
            document.getElementById('currentDayTitle').innerText = `Day ${i+1} 行程 (${dateData[i].dt})`;
            renderPlan();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('tab-'+tab).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
        }

        function renderPlan() {
            const list = document.getElementById('planList');
            const dayPlans = db.plan[activeDay] || [];
            list.innerHTML = dayPlans.map((p, i) => `
                <div class="card">
                    <h3 style="margin:0">${p.name}</h3>
                    ${p.link ? `<a href="${p.link}" target="_blank" style="color:var(--naver); text-decoration:none; font-size:13px; font-weight:bold;">🔗 Naver Map</a>` : ''}
                    <div style="margin-top:10px">
                        <button class="btn-move" onclick="moveP(${i},-1)">↑</button>
                        <button class="btn-move" onclick="moveP(${i},1)">↓</button>
                        <button class="btn-move" style="color:red" onclick="delP(${i})">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        function updateFlightTimer() {
            if(!db.flightTime) return;
            const now = new Date(); 
            const target = new Date(db.flightTime);
            const diff = (target - now) / 1000 / 60; 
            document.getElementById('flightCountDown').innerText = diff > 0 ? 
                `🛫 距離登記/起飛：約 ${Math.floor(diff/60)} 小時 ${Math.floor(diff%60)} 分` : `✈️ 航班已起飛`;
        }

        function renderTodo() {
            document.getElementById('todoList').innerHTML = db.todo.map((t, i) => `
                <div class="todo-item ${t.done?'done':''}" onclick="toggleT(${i})">
                    ${t.done?'✅':'☐'} ${t.text} 
                    <span style="margin-left:auto; color:red; font-size:12px" onclick="event.stopPropagation(); delT(${i})">刪除</span>
                </div>
            `).join('');
        }

        function renderWallet() {
            document.getElementById('walletList').innerHTML = db.wallet.map((w, i) => `
                <div class="card" onclick="delW(${i})">
                    <b>${w.name}</b> <span style="float:right">₩${Number(w.amount).toLocaleString()}</span>
                    <div style="font-size:12px; color:#999; margin-top:5px">NT$ ${Math.round(w.amount*0.024)} | ${w.pay}</div>
                </div>
            `).join('');
        }

        function calcEx(val) { document.getElementById('twdResult').innerText = `≈ NT$ ${Math.round(val*0.024).toLocaleString()}`; }

        let mType = '';
        function openModal(type) {
            mType = type;
            document.getElementById('modal').classList.add('active');
            const f = document.getElementById('modalFields');
            if(type==='p') f.innerHTML = `<input id="i1" placeholder="景點名稱"><input id="i2" placeholder="Naver Map 網址">`;
            if(type==='t') f.innerHTML = `<input id="i1" placeholder="準備事項">`;
            if(type==='f') f.innerHTML = `<input id="i1" placeholder="航班號" value="${db.flight}"><label>起飛時間</label><input id="i2" type="datetime-local" value="${db.flightTime || '2026-05-27T07:30'}">`;
            if(type==='w') f.innerHTML = `<input id="i1" placeholder="品項"><input id="i2" type="number" placeholder="金額 KRW"><select id="i3"><option>現金</option><option>卡片/WOWPASS</option></select>`;
        }

        function handleSave() {
            const v1 = document.getElementById('i1')?.value;
            const v2 = document.getElementById('i2')?.value;
            if(mType==='p' && v1) db.plan[activeDay].push({name:v1, link:v2});
            if(mType==='t' && v1) db.todo.push({text:v1, done:false});
            if(mType==='f') { db.flight = v1; db.flightTime = v2; }
            if(mType==='w' && v1) db.wallet.push({name:v1, amount:v2, pay:document.getElementById('i3').value});
            closeModal(); saveDB(); renderAll();
        }

        function saveDB() { localStorage.setItem('SeoulV9', JSON.stringify(db)); }
        function renderAll() {
            renderPlan(); renderTodo(); renderWallet();
            document.getElementById('flightInfo').innerText = db.flight ? `航班：${db.flight}` : "尚未設定";
            updateFlightTimer();
        }

        function toggleT(i) { db.todo[i].done = !db.todo[i].done; saveDB(); renderTodo(); }
        function moveP(i,d) { 
            let targetIdx = i + d;
            if(targetIdx >= 0 && targetIdx < db.plan[activeDay].length) {
                let temp = db.plan[activeDay][i];
                db.plan[activeDay][i] = db.plan[activeDay][targetIdx];
                db.plan[activeDay][targetIdx] = temp;
                saveDB(); renderPlan();
            }
        }
        function delP(i) { if(confirm('刪除景點？')){db.plan[activeDay].splice(i,1); saveDB(); renderPlan();} }
        function delT(i) { db.todo.splice(i,1); saveDB(); renderTodo(); }
        function delW(i) { if(confirm('刪除紀錄？')){db.wallet.splice(i,1); saveDB(); renderWallet();} }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        init();
    </script>
</body>
</html>
