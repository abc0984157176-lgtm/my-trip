<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul 2026 Ultra</title>
    <style>
        :root { --bg: #F9F9F9; --primary: #4E3629; --naver: #03C75A; --red: #E57373; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding-bottom: 100px; }
        
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; margin: 0; }
        .header h1 span { color: var(--red); }

        /* 日期選擇 */
        .date-picker { display: flex; overflow-x: auto; padding: 10px 20px; gap: 12px; }
        .date-item { min-width: 65px; height: 85px; background: white; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .date-item.active { background: #333; color: white; }

        .content { padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        /* 記帳與預算 */
        .budget-box { background: var(--primary); color: white; border-radius: 22px; padding: 20px; margin-bottom: 20px; }
        .progress-bar { background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-fill { background: var(--red); height: 100%; width: 0%; transition: 0.5s; }

        /* 導覽列 */
        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); height: 65px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2000; }
        .nav-item { border: none; background: none; font-size: 24px; opacity: 0.3; }
        .nav-item.active { opacity: 1; }

        /* 彈窗 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 3000; }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 30px; max-height: 85vh; overflow-y: auto; }
        
        .naver-btn { display: flex; align-items: center; justify-content: center; background: var(--naver); color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; width: 100%; border: none; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #EEE; background: #F9F9F9; font-size: 16px; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>SEOUL</span> 2026</h1>
        <div style="font-size:12px; color:#666; font-weight:bold;">5/27 - 6/2</div>
    </div>

    <!-- 頁面 1: 行前清單 -->
    <div id="tab-todo" class="tab-content" style="display:none">
        <div class="content">
            <h2>✈️ 航班資訊</h2>
            <div class="card" onclick="openModal('f')">
                <div id="flightDisplay" style="font-weight:bold;">點擊設定航班</div>
                <div id="flightTimer" style="font-size:13px; color:var(--red); margin-top:5px;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:30px;">
                <h2>📋 行前準備</h2>
                <button onclick="openModal('t')" style="border:none; background:none; font-size:24px;">+</button>
            </div>
            <div id="todoList"></div>
        </div>
    </div>

    <!-- 頁面 2: 行程表 -->
    <div id="tab-plan" class="tab-content">
        <div class="date-picker" id="datePicker"></div>
        <div class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 id="dayTitle">Day 1</h2>
                <button onclick="openModal('p')" style="border:none; background:none; font-size:24px;">+</button>
            </div>
            <div id="planList"></div>
        </div>
    </div>

    <!-- 頁面 3: 記帳 -->
    <div id="tab-wallet" class="tab-content" style="display:none">
        <div class="content">
            <div class="budget-box">
                <div style="display:flex; justify-content:space-between; font-size:14px;"><span>剩餘預算 (TWD)</span><span onclick="openModal('b')">⚙️</span></div>
                <div id="budgetLeft" style="font-size:32px; font-weight:bold; margin:10px 0;">$ 0</div>
                <div class="progress-bar"><div class="progress-fill" id="budgetBar"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.8;">
                    <span id="budgetSpent">已花: $0</span>
                    <span id="budgetTotal">總額: $0</span>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>消費紀錄</h2>
                <button onclick="openModal('w')" style="border:none; background:none; font-size:24px;">+</button>
            </div>
            <div id="walletList"></div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item" onclick="switchTab('todo', this)">📝</button>
        <button class="nav-item active" onclick="switchTab('plan', this)">🧭</button>
        <button class="nav-item" onclick="switchTab('wallet', this)">💳</button>
    </div>

    <!-- 彈窗 -->
    <div class="modal" id="modal">
        <div class="modal-body">
            <h3 id="modalTitle">新增</h3>
            <div id="modalFields"></div>
            <button class="btn-save" onclick="handleSave()">儲存</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        const RATE = 0.024;
        let activeDay = 0;
        let db = JSON.parse(localStorage.getItem('Seoul2026_Final')) || {
            plan:[[],[],[],[],[],[],[]], todo:[], wallet:[], flight:"", flightTime:"", budget:50000
        };

        function init() {
            const picker = document.getElementById('datePicker');
            const days = [27,28,29,30,31,1,2];
            picker.innerHTML = days.map((d, i) => `
                <div class="date-item ${i===activeDay?'active':''}" onclick="selectDay(${i})">
                    <div style="font-size:10px; opacity:0.5">${i<5?'MAY':'JUN'}</div><div style="font-size:20px; font-weight:bold;">${d}</div>
                </div>
            `).join('');
            renderAll();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById('tab-' + tab).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }

        function selectDay(i) {
            activeDay = i;
            document.getElementById('dayTitle').innerText = `Day ${i+1}`;
            document.querySelectorAll('.date-item').forEach((el, idx) => el.classList.toggle('active', idx===i));
            renderPlan();
        }

        function renderPlan() {
            const list = document.getElementById('planList');
            list.innerHTML = db.plan[activeDay].map((p, i) => `
                <div class="card">
                    <div style="color:var(--red); font-size:13px; font-weight:bold; margin-bottom:5px;">⏰ ${p.time || '--:--'}</div>
                    <h3 style="margin:0">${p.name}</h3>
                    ${p.note ? `<div style="font-size:13px; color:#777; margin-top:8px;">${p.note}</div>` : ''}
                    ${p.link ? `<button onclick="openNaver('${p.link}')" class="naver-btn">📍 Naver Map</button>` : ''}
                    <div style="margin-top:10px; text-align:right;"><button onclick="delP(${i})" style="color:#CCC; border:none; background:none;">🗑️ 刪除</button></div>
                </div>
            `).join('');
        }

        // 🚀 核心跳轉修正：不再產生 404，直接開啟 Naver Map
        function openNaver(url) {
            if (!url) return;
            // 嘗試偵測 naver.me 短網址
            if (url.includes('naver.me')) {
                window.location.href = url; // 這是 iOS/Android 喚起 App 的最直接方法
            } else {
                window.open(url, '_blank');
            }
        }

        function renderWallet() {
            let spent = 0;
            const list = document.getElementById('walletList');
            list.innerHTML = db.wallet.map((w, i) => {
                const twd = Math.round(w.amt * RATE);
                spent += twd;
                return `<div class="card" onclick="delW(${i})"><b>${w.name}</b><br><span style="color:var(--red)">₩${Number(w.amt).toLocaleString()}</span> <small>(≈$${twd})</small></div>`;
            }).join('');
            document.getElementById('budgetLeft').innerText = `$${(db.budget - spent).toLocaleString()}`;
            document.getElementById('budgetSpent').innerText = `已花: $${spent.toLocaleString()}`;
            document.getElementById('budgetTotal').innerText = `總額: $${db.budget.toLocaleString()}`;
            document.getElementById('budgetBar').style.width = Math.min((spent/db.budget)*100, 100) + '%';
        }

        let mType = '';
        function openModal(type) {
            mType = type;
            document.getElementById('modal').classList.add('active');
            const f = document.getElementById('modalFields');
            if(type==='p') f.innerHTML = `<label>時間</label><input id="i1" type="time"><label>景點名稱</label><input id="i2"><label>Naver 連結</label><input id="i3" placeholder="https://naver.me/..."><label>備註</label><textarea id="i4"></textarea>`;
            else if(type==='w') f.innerHTML = `<label>品項</label><input id="i1"><label>金額 (KRW)</label><input id="i2" type="number">`;
            else if(type==='t') f.innerHTML = `<label>準備項目</label><input id="i1">`;
            else if(type==='f') f.innerHTML = `<label>航班號</label><input id="i1" value="${db.flight}"><label>日期時間</label><input id="i2" type="datetime-local" value="${db.flightTime}">`;
            else if(type==='b') f.innerHTML = `<label>預算 (TWD)</label><input id="i1" type="number" value="${db.budget}">`;
        }

        function handleSave() {
            const v1 = document.getElementById('i1')?.value;
            const v2 = document.getElementById('i2')?.value;
            if(mType==='p') db.plan[activeDay].push({time:v1, name:v2, link:document.getElementById('i3').value, note:document.getElementById('i4').value});
            else if(mType==='w') db.wallet.push({name:v1, amt:v2});
            else if(mType==='t') db.todo.push({text:v1, done:false});
            else if(mType==='f') { db.flight = v1; db.flightTime = v2; }
            else if(mType==='b') db.budget = Number(v1);
            save(); closeModal(); renderAll();
        }

        function renderAll() {
            renderPlan(); renderWallet();
            document.getElementById('todoList').innerHTML = db.todo.map((t,i)=>`<div onclick="toggleT(${i})" style="padding:15px; background:white; border-radius:15px; margin-bottom:10px; opacity:${t.done?0.5:1}">${t.done?'✅':'⬜'} ${t.text}</div>`).join('');
            document.getElementById('flightDisplay').innerText = db.flight ? `航班：${db.flight}` : "點擊設定航班";
            updateTimer();
        }

        function updateTimer() {
            if(!db.flightTime) return;
            const diff = (new Date(db.flightTime) - new Date()) / 1000 / 60;
            document.getElementById('flightTimer').innerText = diff > 0 ? `🛫 距離起飛：${Math.floor(diff/60)}時${Math.floor(diff%60)}分` : "祝旅途愉快！";
        }

        function save() { localStorage.setItem('Seoul2026_Final', JSON.stringify(db)); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function delP(i) { db.plan[activeDay].splice(i,1); save(); renderPlan(); }
        function delW(i) { if(confirm('刪除？')){db.wallet.splice(i,1); save(); renderWallet();} }
        function toggleT(i) { db.todo[i].done = !db.todo[i].done; save(); renderAll(); }
        init();
    </script>
</body>
</html>
