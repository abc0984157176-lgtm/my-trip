<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel System V3</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:system-ui;
background:#F3EFEA;
}

.card{
background:white;
border-radius:18px;
padding:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.row-scroll{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:6px;
}

.item{
background:#F6F6F6;
padding:10px;
border-radius:12px;
min-width:160px;
}

.day{
min-width:90px;
padding:10px;
border-radius:14px;
background:#E9E3DA;
text-align:center;
}

.day.active{
background:#2f2f2f;
color:white;
}

.btn{
background:#C97D60;
color:white;
padding:8px;
border-radius:10px;
width:100%;
margin-top:6px;
}

.small{
font-size:12px;
color:#888;
}

input,select{
width:100%;
padding:6px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
}
</style>
</head>

<body class="flex justify-center">

<div class="max-w-md w-full p-4 space-y-4 pb-32">

<!-- 日期 -->
<div class="card">
<div class="font-bold mb-2">📅 旅遊日期</div>
<div id="days" class="row-scroll"></div>
</div>

<!-- 行前準備 -->
<div class="card">
<div class="font-bold mb-2">🎒 行前準備</div>

<div id="prepList" class="row-scroll"></div>

<input id="prepInput" placeholder="新增準備項目">
<button class="btn" onclick="addPrep()">新增</button>
</div>

<!-- 航班 -->
<div class="card">
<div class="font-bold mb-2">✈️ 航班資訊</div>

<div class="row-scroll" id="flightList"></div>

<input id="flightNo" placeholder="航班號">
<input id="flightTime" placeholder="時間">
<input id="flightFrom" placeholder="出發">
<input id="flightTo" placeholder="抵達">

<button class="btn" onclick="addFlight()">新增航班</button>
</div>

<!-- 行程 -->
<div class="card">
<div class="font-bold mb-2">📍 行程</div>

<input id="title" placeholder="地點">
<input id="time" placeholder="時間">
<input id="addr" placeholder="地址">
<input id="map" placeholder="Naver Map連結">

<button class="btn" onclick="addPlan()">新增行程</button>
</div>

<div id="planList" class="space-y-2"></div>

<!-- 記帳 -->
<div class="card">
<div class="font-bold mb-2">💰 記帳 / 預算</div>

<input id="budget" placeholder="總預算">
<button class="btn" onclick="setBudget()">設定預算</button>

<div class="small mt-2" id="remain"></div>

<hr class="my-2">

<input id="expItem" placeholder="花費項目">
<input id="expAmount" placeholder="金額 (TWD)">
<input id="expDate" placeholder="日期">
<select id="expPay">
<option>現金</option>
<option>信用卡</option>
<option>Apple Pay</option>
</select>
<select id="tax">
<option value="no">未退稅</option>
<option value="yes">已退稅</option>
</select>

<button class="btn" onclick="addExpense()">新增花費</button>
</div>

<div id="expList" class="space-y-2"></div>

</div>

<script>

let currentDay=0;
let days=["5/27","5/28","5/29","5/30","5/31","6/1","6/2"];

// ========== DAYS ==========
function renderDays(){
daysDiv.innerHTML=days.map((d,i)=>
`<div onclick="currentDay=${i};renderAll()" class="day ${i==currentDay?'active':''}">
${d}
</div>`).join('');
}
renderDays();

// ========== STORAGE ==========
function get(key){return JSON.parse(localStorage.getItem(key)||"{}")}
function set(key,val){localStorage.setItem(key,JSON.stringify(val))}

// ========== PREP ==========
function addPrep(){
let d=get("prep");
if(!d[currentDay]) d[currentDay]=[];
d[currentDay].push({text:prepInput.value});
set("prep",d);
renderAll();
}

function renderPrep(){
let d=get("prep")[currentDay]||[];
prepList.innerHTML=d.map(x=>`<div class="item">${x.text}</div>`).join('');
}

// ========== FLIGHT ==========
function addFlight(){
let d=get("flight");
if(!d[currentDay]) d[currentDay]=[];

d[currentDay].push({
no:flightNo.value,
time:flightTime.value,
from:flightFrom.value,
to:flightTo.value
});

set("flight",d);
renderAll();
}

function renderFlight(){
let d=get("flight")[currentDay]||[];
flightList.innerHTML=d.map(x=>`
<div class="item">
<div>${x.no}</div>
<div class="small">${x.time}</div>
<div>${x.from} → ${x.to}</div>
</div>`).join('');
}

// ========== PLAN ==========
function addPlan(){
let d=get("plan");
if(!d[currentDay]) d[currentDay]=[];

d[currentDay].push({
title:title.value,
time:time.value,
addr:addr.value,
map:map.value
});

set("plan",d);
renderAll();
}

function renderPlan(){
let d=get("plan")[currentDay]||[];
planList.innerHTML=d.map(x=>`
<div class="item">
<div>
<div class="text-orange-600">${x.time}</div>
<div>${x.title}</div>
<div class="small">${x.addr}</div>
<a href="${x.map}" target="_blank">📍 map</a>
</div>
</div>
`).join('');
}

// ========== BUDGET ==========
function setBudget(){
localStorage.setItem("budget",budget.value);
renderExp();
}

function addExpense(){
let d=get("exp");
if(!d[currentDay]) d[currentDay]=[];

d[currentDay].push({
item:expItem.value,
amount:Number(expAmount.value),
date:expDate.value,
pay:expPay.value,
tax:tax.value
});

set("exp",d);
renderExp();
}

function renderExp(){
let d=get("exp")[currentDay]||[];
let budget=Number(localStorage.getItem("budget")||0);

let total=d.reduce((a,b)=>a+b.amount,0);
let remain=budget-total;

remainDiv.innerHTML=
`預算：${budget} / 已花：${total} / 剩餘：${remain}`;

expList.innerHTML=d.map(x=>`
<div class="item">
<div>${x.item}</div>
<div>${x.amount} TWD</div>
<div class="small">${x.date} | ${x.pay} | ${x.tax}</div>
</div>`).join('');
}

// ========== MASTER ==========
function renderAll(){
renderDays();
renderPrep();
renderFlight();
renderPlan();
renderExp();
}

renderAll();

</script>

</body>
</html>
