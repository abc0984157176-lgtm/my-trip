<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul 2026 Ultimate v2</title>
    <!-- 強制清理 Service Worker 快取 -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>
    <link rel="icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f6eb_1f1f0_1f1f7/512.png">
    <link rel="apple-touch-icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f6eb_1f1f0_1f1f7/512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Seoul 2026">

    <style>
        :root { --bg: #F2F2F7; --primary: #4E3629; --accent: #333; --naver: #03C75A; --red: #E57373; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding-bottom: 120px; }
        .header { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; margin: 0; }
        .header h1 span { color: var(--red); }
        .date-range { background: #DDD; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        .date-picker { display: flex; overflow-x: auto; padding: 10px 20px; gap: 12px; scrollbar-width: none; }
        .date-picker::-webkit-scrollbar { display: none; }
        .date-item { min-width: 65px; height: 85px; background: white; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .date-item.active { background: var(--accent); color: white; }
        .date-item .day { font-size: 20px; font-weight: bold; }
        .content { padding: 0 20px; }
        .day-title-row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .btn-plus { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; }
        .time-tag { color: var(--red); font-size: 13px; font-weight: bold; margin-bottom: 5px; display: block; }
        .note-area { margin-top: 10px; padding-top: 8px; border-top: 1px solid #F2F2F7; font-size: 13px; color: #666; line-height: 1.4; white-space: pre-wrap; }
        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); height: 65px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2000; }
        .nav-item { border: none; background: none; font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.2); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 3000; }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 30px; max-height: 85vh; overflow-y: auto; }
        .naver-btn { display: flex; align-items: center; justify-content: center; background: #03C75A; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 15px; width: 100%; font-size: 16px; gap: 8px; border:none;}
        .edit-btn { background: #555; color: white; padding: 12px; border-radius: 12px; border: none; width: 100%; margin-top: 10px; font-weight: bold; }
        .del-btn { background: #fceaea; color: #E57373; padding: 12px; border-radius: 12px; border: none; width: 100%; margin-top: 10px; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #EEE; background: #F9F9F9; font-size: 16px; }
        textarea { height: 80px; resize: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>SEOUL</span> 2026</h1>
        <div class="date-range">5/27 - 6/2</div>
    </div>

    <div id="tab-plan" class="tab-content">
        <div class="date-picker" id="datePicker"></div>
        <div class="content">
            <div class="day-title-row">
                <h2 id="currentDayLabel">Day 1</h2>
                <button class="btn-plus" onclick="openInputModal()">+</button>
            </div>
            <div id="planList"></div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active">🧭</button>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-body">
            <h2 id="detailTitle">景點名稱</h2>
            <div id="detailNote" style="color:#666; margin:15px 0; white-space: pre-wrap;"></div>
            <button id="naverJumpBtn" class="naver-btn">📍 開啟 Naver Map</button>
            <button id="editItemBtn" class="edit-btn">📝 編輯內容</button>
            <button id="delItemBtn" class="del-btn">🗑️ 刪除</button>
            <button onclick="closeM('detailModal')" style="width:100%; border:none; background:none; margin-top:20px; color:#999;">關閉</button>
        </div>
    </div>

    <div class="modal" id="inputModal">
        <div class="modal-body">
            <h3 id="modalTitle">編輯項目</h3>
            <label>時間</label><input id="i-time" type="time">
            <label>名稱</label><input id="i-name" type="text">
            <label>連結</label><input id="i-link" type="text">
            <label>註記 (直接顯示在卡片)</label><textarea id="i-note"></textarea>
            <button class="edit-btn" style="background:var(--accent)" onclick="handleSave()">儲存</button>
            <button onclick="closeM('inputModal')" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        let activeDay = 0;
        let editIdx = null;
        let db = JSON.parse(localStorage.getItem('SeoulTrip_Final')) || { plan: [[],[],[],[],[],[],[]] };

        function init() {
            const picker = document.getElementById('datePicker');
            const dates = [27,28,29,30,31,1,2];
            picker.innerHTML = dates.map((d, i) => `
                <div class="date-item ${i===activeDay?'active':''}" onclick="selectDay(${i})">
                    <div style="font-size:10px; opacity:0.5">${i<5?'MAY':'JUN'}</div>
                    <div class="day">${d}</div>
                </div>
            `).join('');
            render();
        }

        function selectDay(i) {
            activeDay = i;
            document.getElementById('currentDayLabel').innerText = `Day ${i+1}`;
            document.querySelectorAll('.date-item').forEach((el, idx) => el.classList.toggle('active', idx===i));
            render();
        }

        function render() {
            const list = document.getElementById('planList');
            list.innerHTML = db.plan[activeDay].map((p, i) => `
                <div class="card" onclick="openDetail(${i})">
                    <span class="time-tag">⏰ ${p.time || '--:--'}</span>
                    <h3 style="margin:0">${p.name}</h3>
                    ${p.note ? `<div class="note-area">${p.note}</div>` : ''}
                </div>
            `).join('');
        }

        function openDetail(i) {
            editIdx = i;
            const item = db.plan[activeDay][i];
            document.getElementById('detailTitle').innerText = item.name;
            document.getElementById('detailNote').innerText = item.note || '無備註';
            const nBtn = document.getElementById('naverJumpBtn');
            nBtn.style.display = item.link ? 'flex' : 'none';
            nBtn.onclick = () => window.location.href = item.link;
            document.getElementById('editItemBtn').onclick = () => { closeM('detailModal'); openInputModal(i); };
            document.getElementById('delItemBtn').onclick = () => { if(confirm("刪除？")){ db.plan[activeDay].splice(i,1); save(); render(); closeM('detailModal'); }};
            document.getElementById('detailModal').classList.add('active');
        }

        function openInputModal(i = null) {
            editIdx = i;
            const data = i !== null ? db.plan[activeDay][i] : {time:'', name:'', link:'', note:''};
            document.getElementById('i-time').value = data.time;
            document.getElementById('i-name').value = data.name;
            document.getElementById('i-link').value = data.link;
            document.getElementById('i-note').value = data.note;
            document.getElementById('inputModal').classList.add('active');
        }

        function handleSave() {
            const newItem = {
                time: document.getElementById('i-time').value,
                name: document.getElementById('i-name').value,
                link: document.getElementById('i-link').value,
                note: document.getElementById('i-note').value
            };
            if(editIdx !== null) db.plan[activeDay][editIdx] = newItem;
            else db.plan[activeDay].push(newItem);
            db.plan[activeDay].sort((a,b) => a.time > b.time ? 1 : -1);
            save(); render(); closeM('inputModal');
        }

        function save() { localStorage.setItem('SeoulTrip_Final', JSON.stringify(db)); }
        function closeM(id) { document.getElementById(id).classList.remove('active'); }
        init();
    </script>
</body>
</html>
