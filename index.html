<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul Trip 2026</title>
    <style>
        :root { --bg: #F4EDE6; --primary: #4E3629; --card: #FFFFFF; --accent: #DBCAB7; --naver: #03C75A; --red: #E57373; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding-bottom: 100px; line-height: 1.5; }
        
        /* 頂部導航 */
        .tabs { display: flex; background: white; position: sticky; top: 0; z-index: 100; padding: 10px; gap: 5px; overflow-x: auto; }
        .tab-btn { padding: 8px 15px; border: none; background: none; border-radius: 12px; white-space: nowrap; font-weight: bold; opacity: 0.4; }
        .tab-btn.active { opacity: 1; background: var(--accent); }

        /* 卡片樣式 */
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; }
        .add-btn { background: #B9D1EA; border: none; padding: 10px 20px; border-radius: 15px; font-weight: bold; margin-bottom: 15px; width: 100%; }
        
        /* 列表樣式 */
        .item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #F2F2F7; }
        .item:last-child { border: none; }
        .delete-hint { font-size: 11px; color: var(--red); margin-top: -10px; margin-bottom: 10px; text-align: center; }

        /* 標籤 */
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #EEE; margin-right: 5px; }
        .tag-tax { background: #FFD54F; }
        .tag-pay { background: #E1F5FE; }

        /* 彈窗 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; border-radius: 25px 25px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #EEE; border-radius: 10px; font-size: 16px; }
        .save-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="show('flight', this)">✈️ 航班</button>
        <button class="tab-btn" onclick="show('todo', this)">📋 行前</button>
        <button class="tab-btn" onclick="show('plan', this)">📍 景點</button>
        <button class="tab-btn" onclick="show('wallet', this)">💰 記帳</button>
    </div>

    <!-- 航班資訊 -->
    <div id="flight" class="section active">
        <div class="card">
            <h3>去程航班</h3>
            <div id="f-out">尚未設定</div>
            <hr>
            <h3>回程航班</h3>
            <div id="f-in">尚未設定</div>
            <button class="add-btn" style="margin-top:10px" onclick="openF()">編輯航班</button>
        </div>
    </div>

    <!-- 行前準備 -->
    <div id="todo" class="section">
        <button class="add-btn" onclick="openModal('todo')">+ 新增準備事項</button>
        <p class="delete-hint">提示：點擊文字可勾選，長按項目可刪除</p>
        <div class="card" id="todo-list"></div>
    </div>

    <!-- 景點排序 -->
    <div id="plan" class="section">
        <button class="add-btn" onclick="openModal('plan')">+ 新增景點行程</button>
        <p class="delete-hint">提示：點擊名稱可跳轉 Naver Map</p>
        <div id="plan-list"></div>
    </div>

    <!-- 記帳功能 -->
    <div id="wallet" class="section">
        <div class="card" style="background:#4E3629; color:white;">
            <p>總花費 (TWD約略): <span id="total-twd">0</span></p>
            <p style="font-size:12px; opacity:0.8">匯率參考：1 KRW = 0.024 TWD</p>
        </div>
        <button class="add-btn" onclick="openModal('wallet')">+ 新增支出</button>
        <div id="wallet-list"></div>
    </div>

    <!-- 彈窗 -->
    <div class="modal" id="modal">
        <div class="modal-body">
            <h2 id="modal-title">新增項目</h2>
            <div id="modal-fields"></div>
            <button class="save-btn" onclick="saveData()">確認儲存</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:10px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('SeoulTripFull') || '{"flight":{}, "todo":[], "plan":[], "wallet":[]}');
        let currentMode = '';

        function show(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function render() {
            // 航班
            document.getElementById('f-out').innerHTML = db.flight.out || '點擊編輯設定';
            document.getElementById('f-in').innerHTML = db.flight.in || '點擊編輯設定';

            // 行前
            document.getElementById('todo-list').innerHTML = db.todo.map((item, i) => `
                <div class="item" oncontextmenu="deleteItem('todo', ${i}); return false;">
                    <input type="checkbox" ${item.done?'checked':''} onclick="toggleTodo(${i})">
                    <span style="${item.done?'text-decoration:line-through;opacity:0.5':''}">${item.text}</span>
                </div>
            `).join('');

            // 景點
            document.getElementById('plan-list').innerHTML = db.plan.map((item, i) => `
                <div class="card" oncontextmenu="deleteItem('plan', ${i}); return false;">
                    <div style="display:flex; justify-content:space-between">
                        <span class="tag">DAY ${item.day}</span>
                        <span style="font-size:12px; color:#888">${item.time}</span>
                    </div>
                    <h3 style="margin:10px 0 5px" onclick="window.open('${item.map}')">📍 ${item.name} 🔗</h3>
                    <p style="font-size:13px; color:#666; margin:0">${item.note}</p>
                </div>
            `).join('');

            // 記帳
            let total = 0;
            document.getElementById('wallet-list').innerHTML = db.wallet.map((item, i) => {
                total += (item.amount * 0.024);
                return `
                <div class="card" oncontextmenu="deleteItem('wallet', ${i}); return false;">
                    <div style="display:flex; justify-content:space-between">
                        <b>${item.name}</b>
                        <span>₩${item.amount}</span>
                    </div>
                    <div style="margin-top:5px">
                        <span class="tag tag-pay">${item.pay}</span>
                        ${item.tax === 'yes' ? '<span class="tag tag-tax">可退稅</span>' : ''}
                    </div>
                </div>
            `}).join('');
            document.getElementById('total-twd').innerText = Math.round(total).toLocaleString();
            
            localStorage.setItem('SeoulTripFull', JSON.stringify(db));
        }

        function openModal(mode) {
            currentMode = mode;
            const fields = document.getElementById('modal-fields');
            if(mode === 'todo') {
                fields.innerHTML = '<input id="i1" placeholder="例如：帶環保杯">';
            } else if(mode === 'plan') {
                fields.innerHTML = `
                    <input id="i1" type="number" placeholder="第幾天? (1, 2, 3)">
                    <input id="i2" placeholder="時間 (例如 14:00)">
                    <input id="i3" placeholder="景點名稱">
                    <input id="i4" placeholder="Naver Map 連結">
                    <input id="i5" placeholder="備註">
                `;
            } else if(mode === 'wallet') {
                fields.innerHTML = `
                    <input id="i1" placeholder="品項名稱">
                    <input id="i2" type="number" placeholder="金額 (KRW)">
                    <select id="i3">
                        <option value="現金">現金支付</option>
                        <option value="WOWPASS/卡">WOWPASS / 刷卡</option>
                        <option value="TMONEY">T-Money</option>
                    </select>
                    <select id="i4">
                        <option value="no">不可退稅</option>
                        <option value="yes">需退稅</option>
                    </select>
                `;
            }
            document.getElementById('modal').classList.add('active');
        }

        function openF() {
            currentMode = 'flight';
            document.getElementById('modal-fields').innerHTML = `
                <input id="i1" placeholder="去程資訊 (例: 5/27 BR170 07:30)">
                <input id="i2" placeholder="回程資訊 (例: 6/2 BR159 19:00)">
            `;
            document.getElementById('modal').classList.add('active');
        }

        function saveData() {
            if(currentMode === 'todo') {
                db.todo.push({text: document.getElementById('i1').value, done: false});
            } else if(currentMode === 'plan') {
                db.plan.push({day: document.getElementById('i1').value, time: document.getElementById('i2').value, name: document.getElementById('i3').value, map: document.getElementById('i4').value, note: document.getElementById('i5').value});
                db.plan.sort((a,b) => a.day - b.day); // 自動按天數排序
            } else if(currentMode === 'wallet') {
                db.wallet.push({name: document.getElementById('i1').value, amount: document.getElementById('i2').value, pay: document.getElementById('i3').value, tax: document.getElementById('i4').value});
            } else if(currentMode === 'flight')
