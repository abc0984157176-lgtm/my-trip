<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul 2026</title>
    <style>
        :root { --bg: #F4EDE6; --primary: #4E3629; }
        body { background: var(--bg); color: var(--primary); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        .tab-nav { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; }
        .tab-btn { padding: 10px; border: none; background: #FFF; border-radius: 10px; white-space: nowrap; flex: 1; font-weight: bold; }
        .tab-btn.active { background: #DBCAB7; }
        .section { display: none; } .section.active { display: block; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 15px; border: 1px solid #DDD; border-radius: 8px; font-size: 16px; background: #FAFAFA; }
        .btn-add { background: #B9D1EA; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; margin-bottom: 20px; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px; border-radius: 20px; }
        .item-row { border-bottom: 1px solid #EEE; padding: 10px 0; position: relative; }
    </style>
</head>
<body>
    <div class="tab-nav">
        <button class="tab-btn active" onclick="go('f')">✈️ 航班</button>
        <button class="tab-btn" onclick="go('t')">📋 行前</button>
        <button class="tab-btn" onclick="go('p')">📍 景點</button>
        <button class="tab-btn" onclick="go('w')">💰 記帳</button>
    </div>

    <!-- 各分頁內容 -->
    <div id="sec-f" class="section active">
        <div class="card"><h3>去程</h3><p id="f-out"></p><hr><h3>回程</h3><p id="f-in"></p>
        <button onclick="openM('f')" class="btn-add">編輯航班</button></div>
    </div>
    <div id="sec-t" class="section">
        <button onclick="openM('t')" class="btn-add">+ 新增行前清單</button>
        <div id="list-t"></div>
    </div>
    <div id="sec-p" class="section">
        <button onclick="openM('p')" class="btn-add">+ 新增景點行程</button>
        <div id="list-p"></div>
    </div>
    <div id="sec-w" class="section">
        <div class="card" style="background:var(--primary); color:white; text-align:center;">
            <div style="font-size:24px">NT$ <span id="total-w">0</span></div>
        </div>
        <button onclick="openM('w')" class="btn-add">+ 新增記帳</button>
        <div id="list-w"></div>
    </div>

    <!-- 彈出編輯視窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="m-title"></h2>
            <div id="m-body"></div>
            <button class="btn-save" onclick="save()">儲存確認</button>
            <button onclick="closeM()" style="width:100%; border:none; background:none; margin-top:10px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('Seoul_V3') || '{"f":{"out":"","in":""},"t":[],"p":[],"w":[]}');
        let cur = '';

        function go(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function render() {
            document.getElementById('f-out').innerText = db.f.out || '未設定';
            document.getElementById('f-in').innerText = db.f.in || '未設定';
            
            document.getElementById('list-t').innerHTML = db.t.map((x,i) => `<div class="item-row" onclick="del('t',${i})">☐ ${x} (長按刪除)</div>`).join('');
            
            db.p.sort((a,b)=>a.d - b.d);
            document.getElementById('list-p').innerHTML = db.p.map((x,i) => `
                <div class="card" onclick="del('p',${i})"><b>Day ${x.d} - ${x.t}</b><br>${x.n}<br>
                ${x.l ? `<a href="${x.l}" target="_blank">Naver Map</a>` : ''}</div>`).join('');
            
            let total = 0;
            document.getElementById('list-w').innerHTML = db.w.map((x,i) => {
                total += x.a * 0.024;
                return `<div class="card" onclick="del('w',${i})"><b>[${x.c}] ${x.n}</b><br>₩${x.a} (${x.p}) ${x.tax==='y'?'[退稅]':''}</div>`
            }).join('');
            document.getElementById('total-w').innerText = Math.round(total);
            
            localStorage.setItem('Seoul_V3', JSON.stringify(db));
        }

        function openM(m) {
            cur = m; document.getElementById('modal').classList.add('active');
            const b = document.getElementById('m-body');
            if(m==='f') b.innerHTML = `<input id="v1" placeholder="去程資訊" value="${db.f.out}"><input id="v2" placeholder="回程資訊" value="${db.f.in}">`;
            if(m==='t') b.innerHTML = `<input id="v1" placeholder="要準備什麼?">`;
            if(m==='p') b.innerHTML = `<select id="v1"><option value="1">Day 1 (5/27)</option><option value="2">Day 2 (5/28)</option><option value="3">Day 3 (5/29)</option><option value="4">Day 4 (5/30)</option><option value="5">Day 5 (5/31)</option><option value="6">Day 6 (6/1)</option><option value="7">Day 7 (6/2)</option></select><input id="v2" placeholder="時間"><input id="v3" placeholder="景點名稱"><input id="v4" placeholder="Naver Map 連結"><textarea id="v5" placeholder="備註"></textarea>`;
            if(m==='w') b.innerHTML = `<select id="v0"><option>早餐</option><option>午餐</option><option>晚餐</option><option>衣服</option><option>購物</option></select><input id="v1" placeholder="品項"><input id="v2" type="number" placeholder="金額 (KRW)"><select id="v3"><option>現金</option><option>卡/WOWPASS</option></select><select id="v4"><option value="n">不退稅</option><option value="y">要退稅</option></select>`;
        }

        function save() {
            if(cur==='f') { db.f.out = document.getElementById('v1').value; db.f.in = document.getElementById('v2').value; }
            if(cur==='t') db.t.push(document.getElementById('v1').value);
            if(cur==='p') db.p.push({d:document.getElementById('v1').value, t:document.getElementById('v2').value, n:document.getElementById('v3').value, l:document.getElementById('v4').value});
            if(cur==='w') db.w.push({c:document.getElementById('v0').value, n:document.getElementById('v1').value, a:document.getElementById('v2').value, p:document.getElementById('v3').value, tax:document.getElementById('v4').value});
            closeM(); render();
        }

        function del(m,i) { if(confirm('刪除？')) { db[m].splice(i,1); render(); } }
        function closeM() { document.getElementById('modal').classList.remove('active'); }
        render();
    </script>
</body>
</html>
