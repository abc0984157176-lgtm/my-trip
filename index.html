<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul Trip 2026</title>
    <style>
        :root { --bg: #F4EDE6; --primary: #4E3629; --card: #FFFFFF; --accent: #DBCAB7; --naver: #03C75A; --red: #E57373; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding-bottom: 100px; }
        
        /* 導覽列 */
        .tabs { display: flex; background: white; position: sticky; top: 0; z-index: 100; padding: 10px; gap: 5px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { padding: 10px 15px; border: none; background: none; border-radius: 12px; white-space: nowrap; font-weight: bold; opacity: 0.4; }
        .tab-btn.active { opacity: 1; background: var(--accent); }

        /* 卡片與內容 */
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .add-btn { background: #B9D1EA; border: none; padding: 12px; border-radius: 15px; font-weight: bold; width: 100%; margin-bottom: 15px; font-size: 16px; }
        
        .item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #F2F2F7; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #EEE; margin-right: 5px; font-weight: bold; }
        .tag-tax { background: #FFD54F; }
        .tag-pay { background: #E1F5FE; }

        /* 彈窗設計 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; border-radius: 25px 25px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; }
        input, select { width: 100%; padding: 14px; margin: 8px 0 15px; border: 1px solid #EEE; border-radius: 12px; font-size: 16px; background: #F9F9F9; }
        .save-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 16px; }
        
        .delete-hint { font-size: 12px; color: #999; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="show('flight', this)">✈️ 航班</button>
        <button class="tab-btn" onclick="show('todo', this)">📋 行前</button>
        <button class="tab-btn" onclick="show('plan', this)">📍 景點行程</button>
        <button class="tab-btn" onclick="show('wallet', this)">💰 記帳</button>
    </div>

    <!-- 航班 -->
    <div id="flight" class="section active">
        <div class="card">
            <h3 style="margin-top:0">去程資訊</h3>
            <div id="f-out" style="font-size:18px; font-weight:bold;">尚未設定</div>
            <hr style="opacity:0.1; margin:15px 0">
            <h3 style="margin-top:0">回程資訊</h3>
            <div id="f-in" style="font-size:18px; font-weight:bold;">尚未設定</div>
            <button class="add-btn" style="margin-top:20px; background:#DBCAB7" onclick="openF()">編輯航班資訊</button>
        </div>
    </div>

    <!-- 行前準備 -->
    <div id="todo" class="section">
        <button class="add-btn" onclick="openModal('todo')">+ 新增準備清單</button>
        <p class="delete-hint">點擊文字勾選 / 長按項目刪除</p>
        <div class="card" id="todo-list"></div>
    </div>

    <!-- 景點行程 -->
    <div id="plan" class="section">
        <div style="background:#FFF3E0; padding:10px; border-radius:10px; margin-bottom:15px; font-size:13px;">
            日期範圍：5/27 (三) - 6/2 (二)
        </div>
        <button class="add-btn" onclick="openModal('plan')">+ 新增景點</button>
        <p class="delete-hint">長按景點可刪除</p>
        <div id="plan-list"></div>
    </div>

    <!-- 記帳 -->
    <div id="wallet" class="section">
        <div class="card" style="background:#4E3629; color:white; text-align:center;">
            <div style="opacity:0.8; font-size:14px">預估總花費 (TWD)</div>
            <div style="font-size:32px; font-weight:bold; margin:5px 0">NT$ <span id="total-twd">0</span></div>
            <div style="font-size:12px; opacity:0.6">匯率設定：1 KRW = 0.024 TWD</div>
        </div>
        <button class="add-btn" onclick="openModal('wallet')">+ 新增支出</button>
        <p class="delete-hint">長按支出項目可刪除</p>
        <div id="wallet-list"></div>
    </div>

    <!-- 彈窗 -->
    <div class="modal" id="modal">
        <div class="modal-body">
            <h2 id="modal-title" style="margin-top:0">新增項目</h2>
            <div id="modal-fields"></div>
            <button class="save-btn" onclick="saveData()">儲存並關閉</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        // 核心資料庫
        let db = JSON.parse(localStorage.getItem('Seoul2026_Final') || '{"flight":{"out":"","in":""}, "todo":[], "plan":[], "wallet":[]}');
        let currentMode = '';

        function show(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function render() {
            // 渲染航班
            document.getElementById('f-out').innerText = db.flight.out || "請點擊下方編輯";
            document.getElementById('f-in').innerText = db.flight.in || "請點擊下方編輯";

            // 渲染行前
            document.getElementById('todo-list').innerHTML = db.todo.length ? db.todo.map((item, i) => `
                <div class="item" oncontextmenu="deleteItem('todo', ${i}); return false;" ontouchstart="touchStart(${i}, 'todo')">
                    <input type="checkbox" ${item.done?'checked':''} onclick="toggleTodo(${i})">
                    <span style="${item.done?'text-decoration:line-through;opacity:0.5':''}">${item.text}</span>
                </div>
            `).join('') : '<p style="text-align:center; color:#CCC">尚無清單</p>';

            // 渲染景點 (按天數排序)
            db.plan.sort((a,b) => a.day - b.day);
            document.getElementById('plan-list').innerHTML = db.plan.map((item, i) => `
                <div class="card" oncontextmenu="deleteItem('plan', ${i}); return false;" ontouchstart="touchStart(${i}, 'plan')">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span class="tag" style="background:#DBCAB7">DAY ${item.day}</span>
                        <span style="font-size:13px; color:#999">${item.time}</span>
                    </div>
                    <h3 style="margin:12px 0 8px; color:var(--primary)">${item.name}</h3>
                    ${item.map ? `<a href="${item.map}" target="_blank" style="color:var(--naver); text-decoration:none; font-size:14px; font-weight:bold;">↗ 在 Naver Map 查看</a>` : ''}
                    <p style="font-size:13px; color:#666; margin-top:8px; border-top:1px dashed #EEE; padding-top:8px">${item.note || '無備註'}</p>
                </div>
            `).join('');

            // 渲染記帳
            let totalKRW = 0;
            document.getElementById('wallet-list').innerHTML = db.wallet.map((item, i) => {
                totalKRW += Number(item.amount);
                return `
                <div class="card" oncontextmenu="deleteItem('wallet', ${i}); return false;" ontouchstart="touchStart(${i}, 'wallet')">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <span class="tag">${item.cate}</span>
                            <b style="font-size:16px">${item.name}</b>
                        </div>
                        <b style="font-size:16px">₩${Number(item.amount).toLocaleString()}</b>
                    </div>
                    <div style="margin-top:10px; display:flex; gap:5px">
                        <span class="tag tag-pay">${item.pay}</span>
                        ${item.tax === 'yes' ? '<span class="tag tag-tax">✓ 可退稅</span>' : ''}
                    </div>
                </div>
            `}).join('');
            document.getElementById('total-twd').innerText = Math.round(totalKRW * 0.024).toLocaleString();
            
            localStorage.setItem('Seoul2026_Final', JSON.stringify(db));
        }

        function openModal(mode) {
            currentMode = mode;
            const f = document.getElementById('modal-fields');
            if(mode === 'todo') {
                f.innerHTML = '<input id="i1" placeholder="例如：帶變壓器、護照影本">';
            } else if(mode === 'plan') {
                f.innerHTML = `
                    <select id="i1"><option value="1">Day 1 (5/27)</option><option value="2">Day 2 (5/28)</option><option value="3">Day 3 (5/29)</option><option value="4">Day 4 (5/30)</option><option value="5">Day 5 (5/31)</option><option value="6">Day 6 (6/1)</option><option value="7">Day 7 (6/2)</option></select>
                    <input id="i2" placeholder="時間 (例: 13:00)">
                    <input id="i3" placeholder="景點名稱">
                    <input id="i4" placeholder="Naver Map 網址 (可不填)">
                    <input id="i5" placeholder="備註 (例: 要排隊、必吃什麼)">
                `;
            } else if(mode === 'wallet') {
                f.innerHTML = `
                    <select id="i0"><option>早餐</option><option>午餐</option><option>晚餐</option><option>宵夜</option><option>衣服</option><option>購物</option><option>交通</option><option>其他</option></select>
                    <input id="i1" placeholder="品項名稱">
                    <input id="i2" ty
