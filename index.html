<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App V3.1</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:system-ui;
background:#F3EFEA;
}

/* horizontal scroll */
.row{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:6px;
}

/* date bar */
.day{
min-width:90px;
padding:10px;
border-radius:14px;
background:#E8E0D6;
text-align:center;
flex-shrink:0;
}
.day.active{
background:#2f2f2f;
color:white;
}

/* card */
.card{
background:white;
border-radius:18px;
padding:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

/* item */
.item{
background:#F6F6F6;
padding:10px;
border-radius:12px;
min-width:180px;
flex-shrink:0;
}

/* section title */
.title{
font-weight:600;
margin-bottom:8px;
}

/* input */
input{
width:100%;
padding:6px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
}

.btn{
background:#C97D60;
color:white;
padding:8px;
border-radius:10px;
width:100%;
margin-top:6px;
}
.small{font-size:12px;color:#777;}
</style>
</head>

<body class="flex justify-center">

<div class="max-w-md w-full p-4 space-y-4 pb-32">

<!-- ===== 日期橫向 ===== -->
<div class="card">
<div class="title">📅 旅遊日期</div>
<div id="days" class="row"></div>
</div>

<!-- ===== 航班（固定橫向） ===== -->
<div class="card">
<div class="title">✈️ 航班資訊</div>
<div id="flightRow" class="row"></div>

<input id="fNo" placeholder="航班號">
<input id="fTime" placeholder="時間">
<input id="fFrom" placeholder="出發">
<input id="fTo" placeholder="抵達">
<button class="btn" onclick="addFlight()">新增航班</button>
</div>

<!-- ===== 行前準備（橫向） ===== -->
<div class="card">
<div class="title">🎒 行前準備</div>
<div id="prepRow" class="row"></div>

<input id="prepInput" placeholder="新增項目">
<button class="btn" onclick="addPrep()">新增</button>
</div>

<!-- ===== 行程（橫向卡片） ===== -->
<div class="card">
<div class="title">📍 今日行程</div>
<div id="planRow" class="row"></div>

<input id="t" placeholder="時間">
<input id="ti" placeholder="地點">
<input id="a" placeholder="地址">
<input id="m" placeholder="Naver Map">
<button class="btn" onclick="addPlan()">新增行程</button>
</div>

<!-- ===== 記帳 ===== -->
<div class="card">
<div class="title">💰 記帳</div>

<div class="small" id="budgetInfo"></div>

<input id="budget" placeholder="總預算">
<button class="btn" onclick="setBudget()">設定預算</button>

<input id="item" placeholder="花費項目">
<input id="amt" placeholder="金額">
<input id="date" placeholder="日期">
<button class="btn" onclick="addExp()">新增花費</button>

<div id="expRow" class="row mt-2"></div>
</div>

</div>

<script>

let days=["5/27","5/28","5/29","5/30","5/31","6/1","6/2"];
let current=0;

// ===== date =====
function renderDays(){
daysDiv.innerHTML=days.map((d,i)=>
`<div onclick="current=${i};renderAll()" class="day ${i==current?'active':''}">
${d}
</div>`).join('');
}
renderDays();

// ===== storage =====
function get(k){return JSON.parse(localStorage.getItem(k)||"{}")}
function set(k,v){localStorage.setItem(k,JSON.stringify(v))}

// ===== flights =====
function addFlight(){
let d=get("flight");
if(!d[0]) d[0]=[];

d[0].push({
no:fNo.value,time:fTime.value,
from:fFrom.value,to:fTo.value
});

set("flight",d);
renderAll();
}

function renderFlight(){
let d=get("flight")[0]||[];
flightRow.innerHTML=d.map(x=>
`<div class="item">
<div>${x.no}</div>
<div class="small">${x.time}</div>
<div>${x.from} → ${x.to}</div>
</div>`).join('');
}

// ===== prep =====
function addPrep(){
let d=get("prep");
if(!d[0]) d[0]=[];
d[0].push({t:prepInput.value});
set("prep",d);
renderAll();
}

function renderPrep(){
let d=get("prep")[0]||[];
prepRow.innerHTML=d.map(x=>
`<div class="item">${x.t}</div>`).join('');
}

// ===== plan =====
function addPlan(){
let d=get("plan");
if(!d[current]) d[current]=[];

d[current].push({
time:t.value,
title:ti.value,
addr:a.value,
map:m.value
});

set("plan",d);
renderAll();
}

function renderPlan(){
let d=get("plan")[current]||[];
planRow.innerHTML=d.map(x=>
`<div class="item">
<div class="small">${x.time}</div>
<div>${x.title}</div>
<a target="_blank" href="${x.map}">📍 map</a>
</div>`).join('');
}

// ===== expense =====
function setBudget(){
localStorage.setItem("budget",budget.value);
renderExp();
}

function addExp(){
let d=get("exp");
if(!d[current]) d[current]=[];

d[current].push({
item:item.value,
amt:Number(amt.value),
date:date.value
});

set("exp",d);
renderExp();
}

function renderExp(){
let d=get("exp")[current]||[];
let b=Number(localStorage.getItem("budget")||0);

let total=d.reduce((a,b)=>a+b.amt,0);
budgetInfo.innerHTML=`已花 ${total} / 剩餘 ${b-total}`;

expRow.innerHTML=d.map(x=>
`<div class="item">
<div>${x.item}</div>
<div>${x.amt}</div>
<div class="small">${x.date}</div>
</div>`).join('');
}

// ===== master =====
function renderAll(){
renderDays();
renderFlight();
renderPrep();
renderPlan();
renderExp();
}

renderAll();

</script>

</body>
</html>
