<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul 2026</title>
    <style>
        :root { --bg: #F9F9F9; --primary: #4E3629; --accent: #333; --card: #FFFFFF; --naver: #03C75A; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* 頂部標題與總日期範圍 */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; margin: 0; letter-spacing: 1px; }
        .header h1 span { color: #E57373; margin-right: 5px; }
        .date-range { background: #EEE; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #666; font-weight: bold; }

        /* 橫向日期選擇器 (影片中的樣式) */
        .date-picker { display: flex; overflow-x: auto; padding: 10px 20px; gap: 12px; scrollbar-width: none; }
        .date-picker::-webkit-scrollbar { display: none; }
        .date-item { min-width: 65px; height: 85px; background: white; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .date-item.active { background: var(--accent); color: white; }
        .date-item .week { font-size: 10px; font-weight: bold; opacity: 0.6; margin-bottom: 5px; text-transform: uppercase; }
        .date-item .day { font-size: 20px; font-weight: bold; }

        /* 內容區 */
        .content { padding: 20px; }
        .day-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .day-title-row h2 { font-size: 22px; margin: 0; }
        .btn-plus { width: 45px; height: 45px; background: #DDD; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; font-size: 24px; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 行程卡片 */
        .plan-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; }
        .plan-card h3 { margin: 0 0 8px 0; font-size: 18px; }
        .plan-card .naver-link { color: var(--naver); text-decoration: none; font-size: 13px; font-weight: bold; }
        .plan-card .controls { margin-top: 10px; display: flex; gap: 10px; }
        .plan-card .btn-move { background: #F0F0F0; border: none; padding: 4px 10px; border-radius: 6px; font-size: 11px; }

        /* 匯率與記帳 */
        .exchange-tool { background: var(--primary); color: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .exchange-tool input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 10px; width: 100%; font-size: 18px; margin-top: 10px; }

        /* 底部導航欄 (影片樣式) */
        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); height: 65px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2000; border: 1px solid rgba(0,0,0,0.05); }
        .nav-item { border: none; background: none; color: #CCC; font-size: 24px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }

        /* 彈窗 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 3000; }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 30px; max-height: 80vh; overflow-y: auto; }
        .modal-body input, .modal-body select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #EEE; font-size: 16px; background: #F9F9F9; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; }

        .todo-item { display: flex; align-items: center; padding: 15px; background: white; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .todo-item.done { opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>SEOUL</span>2026</h1>
        <div class="date-range">5/27 - 6/2</div>
    </div>

    <!-- 橫向日期選擇 -->
    <div class="date-picker" id="datePicker">
        <!-- JS 動態生成 -->
    </div>

    <div class="content">
        <!-- 行程分頁 -->
        <div id="tab-plan" class="tab-content">
            <div class="day-title-row">
                <h2 id="currentDayTitle">Day 1 行程</h2>
                <button class="btn-plus" onclick="openModal('p')">+</button>
            </div>
            <div id="planList"></div>
        </div>

        <!-- 航班與清單分頁 -->
        <div id="tab-list" class="tab-content" style="display:none">
            <h2>行前準備 & 航班</h2>
            <div class="card" style="background:#FFF; padding:15px; border-radius:15px; margin-bottom:20px;">
                <button onclick="openModal('f')" style="float:right; border:none; background:none; color:blue;">編輯</button>
                <b>✈️ 航班資訊</b>
                <div id="flightDisplay" style="margin-top:10px; font-size:14px;">未設定</div>
            </div>
            <button class="btn-plus" style="width:100%; border-radius:15px; margin-bottom:15px;" onclick="openModal('t')">+ 新增準備項目</button>
            <div id="todoList"></div>
        </div>

        <!-- 記帳與匯率分頁 -->
        <div id="tab-wallet" class="tab-content" style="display:none">
            <div class="exchange-tool">
                <div style="font-size:14px; opacity:0.8;">💰 匯率換算 (0.024)</div>
                <input type="number" id="krwInput" placeholder="輸入韓元 (KRW)" oninput="convertCurrency(this.value)">
                <div id="twdResult" style="margin-top:15px; font-size:24px; font-weight:bold;">≈ NT$ 0</div>
            </div>
            <div class="day-title-row">
                <h2>消費紀錄</h2>
                <button class="btn-plus" onclick="openModal('w')">+</button>
            </div>
            <div id="walletList"></div>
        </div>
    </div>

    <!-- 底部導航欄 -->
    <div class="nav-bar">
        <button class="nav-item" onclick="switchTab('list', this)">📝</button>
        <button class="nav-item active" onclick="switchTab('plan', this)">🧭</button>
        <button class="nav-item" onclick="switchTab('wallet', this)">💳</button>
    </div>

    <!-- 彈窗 -->
    <div class="modal" id="modal">
        <div class="modal-body">
            <h2 id="modalTitle">新增項目</h2>
            <div id="modalFields"></div>
            <button class="btn-save" onclick="save()">確認儲存</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">取消</button>
        </div>
    </div>

    <script>
        const dates = [
            {day: 27, week: 'WED', date: '5/27'},
            {day: 28, week: 'THR', date: '5/28'},
            {day: 29, week: 'FRI', date: '5/29'},
            {day: 30, week: 'SAT', date: '5/30'},
            {day: 31, week: 'SUN', date: '5/31'},
            {day: 1, week: 'MON', date: '6/1'},
            {day: 2, week: 'TUE', date: '6/2'}
        ];

        let activeDay = 0; // 0 是 5/27
        let db = JSON.parse(localStorage.getItem('SeoulV7')) || { plan: [[],[],[],[],[],[],[]], todo: [], wallet: [], flight: "" };

        function init() {
            const picker = document.getElementById('datePicker');
            picker.innerHTML = dates.map((d, i) => `
                <div class="date-item ${i === activeDay ? 'active' : ''}" onclick="selectDay(${i})">
                    <div class="week">${d.week}</div>
                    <div class="day">${d.day}</div>
                </div>
            `).join('');
            renderPlan();
            renderTodo();
            renderWallet();
            document.getElementById('flightDisplay').innerText = db.flight || "尚未設定航班時間";
        }

        function selectDay(i) {
            activeDay = i;
            document.querySelectorAll('.date-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
            document.getElementById('currentDayTitle').innerText = `Day ${i+1} 行程 (${dates[i].date})`;
            renderPlan();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('tab-' + tab).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
        }

        function renderPlan() {
            const list = document.getElementById('planList');
            const dayPlans = db.plan[activeDay] || [];
            list.innerHTML = dayPlans.map((p, i) => `
                <div class="plan-card">
                    <h3>${p.name}</h3>
                    ${p.link ? `<a href="${p.link}" target="_blank" class="naver-link">↗ 在 Naver Map 查看</a>` : ''}
                    <div class="controls">
                        <button class="btn-move" onclick="movePlan(${i}, -1)">↑</button>
                        <button class="btn-move" onclick="movePlan(${i}, 1)">↓</button>
                        <button class="btn-move" style="color:red" onclick="deletePlan(${i})">刪除</button>
                    </div>
                </div>
            `).join('');
            saveDB();
        }

        function movePlan(i, dir) {
            let target = i + dir;
            if (target >= 0 && target < db.plan[activeDay].length) {
                [db.plan[activeDay][i], db.plan[activeDay][target]] = [db.plan[activeDay][target], db.plan[activeDay][i]];
                renderPlan();
            }
        }

        function deletePlan(i) { if(confirm('要刪除嗎？')) { db.plan[activeDay].splice(i, 1); renderPlan(); } }

        function renderTodo() {
            document.getElementById('todoList').innerHTML = db.todo.map((t, i) => `
                <div class="todo-item ${t.done ? 'done' : ''}" onclick="toggleTodo(${i})">
                    ${t.done ? '✅' : '☐'} ${t.text}
                </div>
            `).join('');
        }
        function toggleTodo(i) { db.todo[i].done = !db.todo[i].done; renderTodo(); saveDB(); }

        function renderWallet() {
            document.getElementById('walletList').innerHTML = db.wallet.map((w, i) => `
                <div class="plan-card" onclick="deleteWallet(${i})">
                    <b>${w.name}</b> <span style="float:right">₩${Number(w.amount).toLocaleString()}</span>
                    <div style="font-size:12px; color:#999; margin-top:5px;">NT$ ${Math.round(w.amount * 0.024)} | ${w.pay} | ${w.tax === 'y' ? '可退稅' : ''}</div>
                </div>
            `).join('');
        }
        function deleteWallet(i) { if(confirm('刪除記帳？')) { db.wallet.splice(i,1); renderWallet(); saveDB(); } }

        function convertCurrency(val) {
            document.getElementById('twdResult').innerText = `≈ NT$ ${Math.round(val * 0.024).toLocaleString()}`;
        }

        let modalType = '';
        function openModal(type) {
            modalType = type;
            document.getElementById('modal').classList.add('active');
            const fields = document.getElementById('modalFields');
            if(type === 'p') {
                fields.innerHTML = `<input id="f1" placeholder="景點名稱"><input id="f2" placeholder="Naver Map 網址">`;
            } else if(type === 't') {
                fields.innerHTML = `<input id="f1" placeholder="準備事項內容">`;
            } else if(type === 'w') {
                fields.innerHTML = `<input id="f1" placeholder="項目名稱"><input id="f2" type="number" placeholder="韓元金額"><select id="f3"><option>現金</option><option>刷卡/WOWPASS</option></select><select id="f4"><option value="n">不退稅</option><option value="y">可退稅</option></select>`;
            } else if(type === 'f') {
                fields.innerHTML = `<input id="f1" placeholder="航班編號與時間 (5/27 07:30 BR170)">`;
            }
        }

        function save() {
            const f1 = document.getElementById('f1')?.value;
            const f2 = document.getElementById('f2')?.value;
            if(modalType === 'p') db.plan[activeDay].push({name: f1, link: f2});
            if(modalType === 't') db.todo.push({text: f1, done: false});
            if(modalType === 'f') db.flight = f1;
            if(modalType === 'w') db.wallet.push({name: f1, amount: f2, pay: document.getElementById('f3').value, tax: document.getElementById('f4').value});
            
            closeModal();
            renderPlan(); renderTodo(); renderWallet();
            document.getElementById('flightDisplay').innerText = db.flight;
            saveDB();
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function saveDB() { localStorage.setItem('SeoulV7', JSON.stringify(db)); }

        init();
    </script>
</body>
</html>
