<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Design</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter','Noto Sans TC';
background:#F3EFEA;
letter-spacing:0.2px;
}

/* 日期卡 */
.day{
min-width:80px;
padding:12px;
border-radius:18px;
background:#EAE4DC;
text-align:center;
transition:.2s;
}
.day.active{
background:#4E4848;
color:#fff;
transform:scale(1.05);
}

/* 卡片 */
.card{
background:#fff;
border-radius:20px;
padding:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

/* list item */
.item{
background:#F6F6F6;
border-radius:14px;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
transition:.2s;
}
.item:active{
transform:scale(0.97);
}

/* overlay */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
opacity:0;
pointer-events:none;
transition:.3s;
}
.overlay.show{
opacity:1;
pointer-events:auto;
}

/* bottom sheet */
.sheet{
position:fixed;
left:0;right:0;
bottom:-100%;
background:#fff;
border-radius:28px 28px 0 0;
padding:20px;
transition:.35s cubic-bezier(.25,.8,.25,1);
}
.sheet.show{bottom:0;}

.handle{
width:40px;height:4px;
background:#ccc;
border-radius:10px;
margin:auto;margin-bottom:10px;
}

/* Naver按鈕 */
.naver{
background:#03C75A;
color:white;
padding:14px;
border-radius:16px;
text-align:center;
font-weight:600;
box-shadow:0 6px 12px rgba(3,199,90,0.3);
}
.naver:active{transform:scale(0.97);}

</style>
</head>

<body class="flex justify-center">
<div class="max-w-md w-full p-4 pb-24 space-y-4">

<!-- 日期 -->
<div id="days" class="flex gap-2 overflow-x-auto"></div>

<!-- 行程新增 -->
<div class="card space-y-2">
<input id="time" placeholder="14:00" class="w-full border p-2 rounded">
<input id="title" placeholder="地點名稱" class="w-full border p-2 rounded">
<input id="addr" placeholder="地址" class="w-full border p-2 rounded">
<input id="map" placeholder="Naver Map連結" class="w-full border p-2 rounded">
<textarea id="menu" placeholder="推薦餐點" class="w-full border p-2 rounded"></textarea>

<button onclick="addPlan()" class="w-full bg-[#C97D60] text-white py-2 rounded">
新增行程
</button>
</div>

<!-- 行程列表 -->
<div id="planList" class="space-y-2"></div>

</div>

<!-- overlay -->
<div id="overlay" class="overlay" onclick="closeSheet()"></div>

<!-- bottom sheet -->
<div id="sheet" class="sheet">

<div class="handle"></div>

<div class="flex justify-between mb-2">
<div class="bg-orange-400 text-white text-xs px-2 py-1 rounded">FOOD</div>
<button onclick="closeSheet()">✕</button>
</div>

<div id="dTime" class="text-gray-400"></div>

<input id="editTitle" class="text-xl font-semibold w-full mb-1 border-b">
<input id="editAddr" class="text-sm text-gray-500 w-full mb-3 border-b">

<a id="dMap" target="_blank" class="naver mb-3">
📍 NAVER MAP
</a>

<div class="text-xs text-gray-400 mb-1">RECOMMENDED</div>
<textarea id="editMenu" class="w-full bg-gray-100 p-3 rounded"></textarea>

<button onclick="saveEdit()" class="mt-3 w-full bg-black text-white py-2 rounded">
儲存
</button>

</div>

<script>

// 日期
let days=["MON 5/27","TUE 5/28","WED 5/29","THU 5/30","FRI 5/31","SAT 6/1","SUN 6/2"];
let current=0;

function renderDays(){
let html="";
days.forEach((d,i)=>{
html+=`<div onclick="selectDay(${i})"
class="day ${i==current?'active':''}">
${d}
</div>`;
});
document.getElementById("days").innerHTML=html;
}
renderDays();

function selectDay(i){
current=i;
renderDays();
renderPlan();
}

// 資料
function getData(){return JSON.parse(localStorage.getItem('plan')||'{}');}
function saveData(d){localStorage.setItem('plan',JSON.stringify(d));}

// 新增
function addPlan(){
let d=getData();
if(!d[current]) d[current]=[];

d[current].push({
time:time.value,
title:title.value,
addr:addr.value,
map:map.value,
menu:menu.value
});

saveData(d);
renderPlan();
}

// 顯示
function renderPlan(){
let d=getData()[current]||[];
let html="";
d.forEach((x,i)=>{
html+=`
<div onclick="openSheet(${i})" class="item">
<div>
<div class="text-[#C97D60] text-sm">${x.time}</div>
<div>${x.title}</div>
</div>
</div>`;
});
planList.innerHTML=html;
}

// sheet
let currentIndex=0;

function openSheet(i){
currentIndex=i;
let d=getData()[current][i];

dTime.innerText=d.time;
editTitle.value=d.title;
editAddr.value=d.addr;
editMenu.value=d.menu;
dMap.href=d.map;

overlay.classList.add("show");
sheet.classList.add("show");
}

// 關閉
function closeSheet(){
overlay.classList.remove("show");
sheet.classList.remove("show");
}

// 滑動關閉
let startY=0;
sheet.addEventListener("touchstart",e=>startY=e.touches[0].clientY);
sheet.addEventListener("touchmove",e=>{
if(e.touches[0].clientY-startY>80) closeSheet();
});

// 儲存編輯
function saveEdit(){
let d=getData();
let item=d[current][currentIndex];

item.title=editTitle.value;
item.addr=editAddr.value;
item.menu=editMenu.value;

saveData(d);
renderPlan();
closeSheet();
}

// init
renderPlan();

</script>

</body>
</html>
