<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter&family=Noto+Sans+TC&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter','Noto Sans TC';background:#F8F9F8;}
.card{background:#fff;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,0.06);}
.day{padding:8px 14px;border-radius:12px;background:#EDEAE6;}
.active{background:#4E4848;color:white;}
.sheet{position:fixed;left:0;right:0;bottom:-100%;transition:.35s;}
.sheet.show{bottom:0;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);opacity:0;pointer-events:none;}
.overlay.show{opacity:1;pointer-events:auto;}
</style>
</head>

<body class="flex justify-center">
<div class="max-w-md w-full p-4 pb-28 space-y-4">

<!-- 日期 -->
<div id="days" class="flex gap-2 overflow-x-auto"></div>

<!-- 行程新增 -->
<div class="card p-4 space-y-2">
<input id="time" placeholder="時間" class="w-full border p-2 rounded">
<input id="title" placeholder="地點" class="w-full border p-2 rounded">
<input id="map" placeholder="Naver Map連結" class="w-full border p-2 rounded">

<select id="type" class="w-full border p-2 rounded">
<option>FOOD</option>
<option>CAFE</option>
<option>SHOP</option>
<option>SPOT</option>
</select>

<button onclick="addPlan()" class="w-full bg-[#C97D60] text-white py-2 rounded">
新增行程
</button>
</div>

<!-- 行程列表 -->
<div id="planList"></div>

<!-- 記帳 -->
<div class="card p-4">
<h2 class="font-semibold mb-2">記帳</h2>

<input id="money" placeholder="韓幣" class="w-full border p-2 rounded mb-2">

<select id="payType" class="w-full border p-2 rounded mb-2">
<option>早餐</option>
<option>午餐</option>
<option>晚餐</option>
<option>購物</option>
<option>交通</option>
</select>

<select id="exchange" class="w-full border p-2 rounded mb-2">
<option>未換匯</option>
<option>已換匯</option>
</select>

<button onclick="addExpense()" class="w-full bg-[#4E4848] text-white py-2 rounded">
新增花費
</button>

<div id="total" class="mt-2 text-sm"></div>
</div>

</div>

<!-- 遮罩 -->
<div id="overlay" class="overlay" onclick="closeSheet()"></div>

<!-- Bottom Sheet -->
<div id="sheet" class="sheet bg-white rounded-t-3xl p-5">
<div id="dTitle" class="text-xl font-semibold"></div>
<a id="dMap" target="_blank" class="block bg-green-500 text-white text-center py-3 rounded mt-3">
開啟地圖
</a>
</div>

<script>

// 日期
let days=["5/27","5/28","5/29","5/30","5/31","6/1","6/2"];
let currentDay="5/27";

function renderDays(){
let html="";
days.forEach(d=>{
html+=`<div onclick="selectDay('${d}')"
class="day ${d==currentDay?'active':''}">${d}</div>`;
});
days.innerHTML=html;
}
renderDays();

// 資料
function getData(){return JSON.parse(localStorage.getItem('data')||'{}');}
function saveData(d){localStorage.setItem('data',JSON.stringify(d));}

// 行程
function addPlan(){
let d=getData();
if(!d[currentDay]) d[currentDay]=[];
d[currentDay].push({time:time.value,title:title.value,map:map.value});
saveData(d);
renderPlan();
}

function renderPlan(){
let d=getData()[currentDay]||[];
let html="";
d.forEach((x,i)=>{
html+=`
<div onclick="openSheet(${i})" class="card p-3 mb-2">
<div class="text-[#C97D60]">${x.time}</div>
<div>${x.title}</div>
</div>`;
});
planList.innerHTML=html;
}

// Sheet
function openSheet(i){
let d=getData()[currentDay][i];
dTitle.innerText=d.title;
dMap.href=d.map;
overlay.classList.add("show");
sheet.classList.add("show");
}
function closeSheet(){
overlay.classList.remove("show");
sheet.classList.remove("show");
}

// 記帳
function addExpense(){
let list=JSON.parse(localStorage.getItem('exp')||'[]');
list.push({money:money.value,day:currentDay});
localStorage.setItem('exp',JSON.stringify(list));
calc();
}

function calc(){
let list=JSON.parse(localStorage.getItem('exp')||'[]');
let sum=0;
list.forEach(x=>{
if(x.day==currentDay) sum+=Number(x.money);
});
total.innerText="今日花費："+sum+"₩";
}

// init
renderPlan();
calc();

</script>

</body>
</html>
