<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>旅行管理工具</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter&family=Noto+Sans+TC&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter','Noto Sans TC';background:#F8F9F8;}
.active{color:#C97D60;}
</style>
</head>

<body class="flex justify-center">
<div class="max-w-md w-full pb-24">

<!-- ================= 行程 ================= -->
<div id="plan" class="tab p-4 space-y-4">

<h2 class="font-semibold text-lg">✈️ 航班資訊</h2>

<input id="flight" placeholder="例：高雄→仁川 07:05"
class="w-full border p-2 rounded">

<button onclick="saveFlight()" class="w-full bg-[#4E4848] text-white py-2 rounded">儲存</button>

<div id="flightDisplay" class="text-sm"></div>

<hr>

<h2 class="font-semibold">📅 行程（5/27-6/2）</h2>

<input id="date" type="date" class="w-full border p-2 rounded">
<input id="place" placeholder="景點名稱" class="w-full border p-2 rounded mt-2">
<input id="link" placeholder="Naver Map連結" class="w-full border p-2 rounded mt-2">

<button onclick="addPlan()" class="w-full bg-[#C97D60] text-white py-2 rounded mt-2">新增行程</button>

<div id="planList" class="space-y-2"></div>

</div>

<!-- ================= 記帳 ================= -->
<div id="wallet" class="tab hidden p-4 space-y-4">

<h2 class="font-semibold">💱 匯率換算</h2>
<input id="krw" placeholder="韓幣算式" class="w-full border p-2 rounded">
<input id="rate" value="0.024" class="w-full border p-2 rounded mt-2">
<button onclick="convert()" class="w-full bg-[#4E4848] text-white py-2 rounded mt-2">換算</button>
<p id="result"></p>

<hr>

<h2 class="font-semibold">💰 記帳</h2>

<input id="item" placeholder="品項" class="w-full border p-2 rounded">
<input id="money" placeholder="韓幣" class="w-full border p-2 rounded mt-2">

<select id="type" class="w-full border p-2 rounded mt-2">
<option>早餐</option>
<option>午餐</option>
<option>晚餐</option>
<option>購物</option>
<option>交通</option>
</select>

<select id="exchange" class="w-full border p-2 rounded mt-2">
<option>未換匯</option>
<option>已換匯</option>
</select>

<button onclick="addExpense()" class="w-full bg-[#C97D60] text-white py-2 rounded mt-2">新增</button>

<div id="expenseList"></div>

</div>

<!-- ================= 準備 ================= -->
<div id="prep" class="tab hidden p-4 space-y-4">

<h2 class="font-semibold">🧳 行前準備</h2>

<input id="prepInput" placeholder="新增項目"
class="w-full border p-2 rounded">

<button onclick="addPrep()" class="w-full bg-[#4E4848] text-white py-2 rounded">新增</button>

<div id="prepList"></div>

</div>

</div>

<!-- ================= 底部 ================= -->
<div class="fixed bottom-0 max-w-md w-full bg-white border-t flex justify-around py-2">

<button onclick="tab('plan',this)" class="active">行程</button>
<button onclick="tab('wallet',this)">記帳</button>
<button onclick="tab('prep',this)">準備</button>

</div>

<script>

// tab
function tab(id,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

// 航班
function saveFlight(){
let f=document.getElementById('flight').value;
localStorage.setItem('flight',f);
showFlight();
}
function showFlight(){
document.getElementById('flightDisplay').innerText=
localStorage.getItem('flight')||"尚未設定";
}

// 行程
function addPlan(){
let d=date.value,p=place.value,l=link.value;
let list=JSON.parse(localStorage.getItem('plan')||'[]');
list.push({d,p,l});
localStorage.setItem('plan',JSON.stringify(list));
renderPlan();
}
function renderPlan(){
let list=JSON.parse(localStorage.getItem('plan')||'[]');
let html="";
list.forEach(x=>{
html+=`
<div class="bg-white p-3 rounded shadow text-sm">
<div>${x.d}</div>
<div>${x.p}</div>
<a href="${x.l}" target="_blank" class="text-blue-500">Naver Map</a>
</div>`;
});
planList.innerHTML=html;
}

// 匯率
function safe(s){
if(!/^[0-9+\-*/.]+$/.test(s)) return 0;
return Function('return '+s)();
}
function convert(){
let r=rate.value;
let k=safe(krw.value);
result.innerText="台幣："+(k*r).toFixed(2);
}

// 記帳
function addExpense(){
let data={
item:item.value,
money:money.value,
type:type.value,
exchange:exchange.value,
time:new Date().toLocaleString()
};
let list=JSON.parse(localStorage.getItem('exp')||'[]');
list.push(data);
localStorage.setItem('exp',JSON.stringify(list));
renderExp();
}

function renderExp(){
let list=JSON.parse(localStorage.getItem('exp')||'[]');
let html="";
list.forEach(x=>{
html+=`
<div class="bg-white p-3 rounded shadow text-sm">
<div>${x.item} - ${x.money}₩</div>
<div>${x.type}｜${x.exchange}</div>
<div class="text-xs text-gray-400">${x.time}</div>
</div>`;
});
expenseList.innerHTML=html;
}

// 準備
function addPrep(){
let val=prepInput.value;
let list=JSON.parse(localStorage.getItem('prep')||'[]');
list.push({text:val,done:false});
localStorage.setItem('prep',JSON.stringify(list));
renderPrep();
}
function togglePrep(i){
let list=JSON.parse(localStorage.getItem('prep'));
list[i].done=!list[i].done;
localStorage.setItem('prep',JSON.stringify(list));
renderPrep();
}
function renderPrep(){
let list=JSON.parse(localStorage.getItem('prep')||'[]');
let html="";
list.forEach((x,i)=>{
html+=`
<label class="flex gap-2 ${x.done?'line-through text-gray-400':''}">
<input type="checkbox" ${x.done?'checked':''} onchange="togglePrep(${i})">
${x.text}
</label>`;
});
prepList.innerHTML=html;
}

// init
showFlight();
renderPlan();
renderExp();
renderPrep();

</script>

</body>
</html>
